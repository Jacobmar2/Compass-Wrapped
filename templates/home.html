<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Compass Wrapped!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>



<body>

    <!-- Move this higher using .top-welcome -->
    <div class="card top-welcome">
        <h2>Welcome to Compass Wrapped!</h2>
    </div>

    <!-- Main button -->
    <a href="/howto" class="button-card">
        How to get your Compass Card CSV File
    </a>

    <!-- Upload form -->
    <div class="card">
        <h2>Upload Your Transit Compass Card CSV</h2>
        <form method="POST" enctype="multipart/form-data" class="home-upload-form">
            <div class="file-picker">
                <input id="homeFileInput" class="file-picker-input" type="file" name="file" accept=".csv" required>
                <label for="homeFileInput" class="file-picker-shell" aria-label="Choose CSV file">
                    <span class="file-picker-button">Browse...</span>
                    <span id="homeSelectedFileName" class="file-picker-name is-empty">No file selected.</span>
                </label>
            </div>
            <button type="submit">Upload</button>
        </form>
    </div>

    <a href="/more" class="button-card">
        More Compass Wrapped!
    </a>

    <a href="/about" class="button-card button-small">
        About Compass Wrapped
    </a>

    <!-- Social icons footer -->
    <div class="footer-icons">

        <!-- GitHub Icon -->
        <a href="https://github.com/Jacobmar2" target="_blank">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg" alt="GitHub">
        </a>

        <!-- LinkedIn Icon -->
        <a href="https://www.linkedin.com/in/jacob-martinez0422/" target="_blank">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/linkedin.svg" alt="LinkedIn">
        </a>

    </div>

    <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-hidden="true">
        <div class="loading-overlay-content" role="status">
            <div class="loading-overlay-spinner" aria-hidden="true"></div>
            <p id="loadingOverlayText" class="loading-overlay-text">Revealing Your Compass Wrapped</p>
        </div>
    </div>

    <script>
        const homeUploadForm = document.querySelector(".home-upload-form");
        const homeFileInput = document.getElementById("homeFileInput");
        const homeSelectedFileName = document.getElementById("homeSelectedFileName");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const loadingOverlayText = document.getElementById("loadingOverlayText");

        function showLoadingOverlay(message) {
            if (!loadingOverlay || !loadingOverlayText) return;
            loadingOverlayText.textContent = message;
            loadingOverlay.classList.add("is-visible");
            loadingOverlay.setAttribute("aria-hidden", "false");
        }

        function updateSelectedFileName(input, output, emptyText) {
            if (!input || !output) return;
            const selectedFile = input.files && input.files.length ? input.files[0] : null;
            output.textContent = selectedFile ? selectedFile.name : emptyText;
            output.classList.toggle("is-empty", !selectedFile);
        }

        if (homeFileInput && homeSelectedFileName) {
            homeFileInput.addEventListener("change", () => {
                updateSelectedFileName(homeFileInput, homeSelectedFileName, "No file selected.");
            });
            updateSelectedFileName(homeFileInput, homeSelectedFileName, "No file selected.");
        }

        if (homeUploadForm) {
            homeUploadForm.addEventListener("submit", () => {
                showLoadingOverlay("Revealing Your Compass Wrapped");
            });
        }
    </script>

</body>
</html>
