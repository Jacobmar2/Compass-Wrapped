<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More Compass Wrapped!</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .multi-csv-controls {
            display: flex;
            justify-content: center;
            margin-top: 1em;
        }

        .multi-csv-dropzone {
            border: 2px dashed #ffffff;
            border-radius: 10px;
            padding: 14px;
            margin: 1em auto 0.6em auto;
            max-width: 560px;
            text-align: center;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .multi-csv-dropzone.drag-active {
            background-color: rgba(255, 255, 255, 0.16);
            border-color: #d6efff;
        }

        .multi-csv-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 2.2em;
        }

        .multi-csv-actions button {
            margin: 0;
            width: auto;
            min-width: 140px;
        }

        .remove-csv-btn {
            background-color: #d9534f;
            color: #ffffff;
        }

        .remove-csv-btn:hover {
            background-color: #c9302c;
            color: #ffffff;
        }

        .multi-csv-list {
            margin-top: 1em;
            text-align: center;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .multi-csv-list-item {
            margin: 6px auto;
            word-break: break-word;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            max-width: 95%;
        }

        .multi-csv-file-name {
            text-align: center;
        }

        .remove-one-file-btn {
            width: 22px;
            min-width: 22px;
            height: 22px;
            padding: 0;
            margin: 0;
            border-radius: 50%;
            line-height: 1;
            font-size: 0.9em;
            background-color: #d9534f;
            color: #ffffff;
        }

        .remove-one-file-btn:hover {
            background-color: #c9302c;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>More Compass Wrapped!</h2>
    </div>

    <div class="card">
        <h2>Upload multiple CSV's</h2>
        <form id="multi-csv-form" method="POST" action="/more/upload-multiple" enctype="multipart/form-data">
            <input id="multi-csv-input" type="file" name="files" accept=".csv" multiple style="display: none;">
            <div id="multi-csv-dropzone" class="multi-csv-dropzone">
                Drag & drop CSV files here
            </div>
            <div class="multi-csv-controls">
                <button id="multi-csv-add-btn" type="button">Browse...</button>
            </div>
            <p id="multi-csv-selected">No files selected yet.</p>
            <div id="multi-csv-list" class="multi-csv-list"></div>
            <div class="multi-csv-actions">
                <button type="submit">Upload CSV's</button>
                <button id="multi-csv-remove-btn" class="remove-csv-btn" type="button">Remove CSV's</button>
            </div>
        </form>
    </div>

    <div class="card">
        <h2>Compass Slideshow</h2>
        <form id="slideshow-upload-form" method="POST" action="/more/upload-slideshow" enctype="multipart/form-data">
            <div class="file-picker">
                <input id="slideshow-file-input" class="file-picker-input" type="file" name="file" accept=".csv" required>
                <label for="slideshow-file-input" class="file-picker-shell" aria-label="Choose slideshow CSV file">
                    <span class="file-picker-button">Browse...</span>
                    <span id="slideshow-selected-file" class="file-picker-name is-empty">No file selected.</span>
                </label>
            </div>
            <button type="submit">Upload CSV</button>
        </form>
    </div>

    <a href="/" class="button-card button-small">&laquo; Back to Home / Upload Page</a>

    <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-hidden="true">
        <div class="loading-overlay-content" role="status">
            <div class="loading-overlay-spinner" aria-hidden="true"></div>
            <p id="loadingOverlayText" class="loading-overlay-text">Revealing Your Compass Wrapped</p>
        </div>
    </div>

    <script>
        const multiCsvForm = document.getElementById("multi-csv-form");
        const multiCsvInput = document.getElementById("multi-csv-input");
        const multiCsvDropzone = document.getElementById("multi-csv-dropzone");
        const multiCsvAddBtn = document.getElementById("multi-csv-add-btn");
        const multiCsvRemoveBtn = document.getElementById("multi-csv-remove-btn");
        const multiCsvSelected = document.getElementById("multi-csv-selected");
        const multiCsvList = document.getElementById("multi-csv-list");
        const slideshowFileInput = document.getElementById("slideshow-file-input");
        const slideshowSelectedFile = document.getElementById("slideshow-selected-file");
        const slideshowUploadForm = document.getElementById("slideshow-upload-form");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const loadingOverlayText = document.getElementById("loadingOverlayText");

        let selectedFiles = [];

        function showLoadingOverlay(message) {
            if (!loadingOverlay || !loadingOverlayText) return;
            loadingOverlayText.textContent = message;
            loadingOverlay.classList.add("is-visible");
            loadingOverlay.setAttribute("aria-hidden", "false");
        }

        function hideLoadingOverlay() {
            if (!loadingOverlay) return;
            loadingOverlay.classList.remove("is-visible");
            loadingOverlay.setAttribute("aria-hidden", "true");
        }

        function fileKey(file) {
            return `${file.name}__${file.size}__${file.lastModified}`;
        }

        function syncInputFiles() {
            const dataTransfer = new DataTransfer();
            selectedFiles.forEach((file) => dataTransfer.items.add(file));
            multiCsvInput.files = dataTransfer.files;
        }

        function addIncomingFiles(incomingFiles) {
            const existingKeys = new Set(selectedFiles.map(fileKey));

            incomingFiles.forEach((file) => {
                if (!file.name.toLowerCase().endsWith(".csv")) {
                    return;
                }

                const key = fileKey(file);
                if (!existingKeys.has(key)) {
                    selectedFiles.push(file);
                    existingKeys.add(key);
                }
            });

            syncInputFiles();
            renderSelectedFiles();
        }

        function renderSelectedFiles() {
            multiCsvList.innerHTML = "";

            if (!selectedFiles.length) {
                multiCsvAddBtn.textContent = "Browse...";
                multiCsvSelected.textContent = "No files selected yet.";
                return;
            }

            multiCsvAddBtn.textContent = "Add...";
            multiCsvSelected.textContent = `Selected ${selectedFiles.length} file(s):`;

            selectedFiles.forEach((file, index) => {
                const item = document.createElement("p");
                item.className = "multi-csv-list-item";

                const fileName = document.createElement("span");
                fileName.className = "multi-csv-file-name";
                fileName.textContent = file.name;

                const removeOneBtn = document.createElement("button");
                removeOneBtn.type = "button";
                removeOneBtn.className = "remove-one-file-btn";
                removeOneBtn.textContent = "x";
                removeOneBtn.setAttribute("aria-label", `Remove ${file.name}`);
                removeOneBtn.addEventListener("click", () => {
                    selectedFiles.splice(index, 1);
                    syncInputFiles();
                    renderSelectedFiles();
                });

                item.appendChild(fileName);
                item.appendChild(removeOneBtn);
                multiCsvList.appendChild(item);
            });
        }

        function updateSelectedFileName(input, output, emptyText) {
            if (!input || !output) return;
            const selectedFile = input.files && input.files.length ? input.files[0] : null;
            output.textContent = selectedFile ? selectedFile.name : emptyText;
            output.classList.toggle("is-empty", !selectedFile);
        }

        multiCsvAddBtn.addEventListener("click", () => {
            multiCsvInput.click();
        });

        multiCsvInput.addEventListener("change", () => {
            const incomingFiles = Array.from(multiCsvInput.files || []);
            addIncomingFiles(incomingFiles);
            multiCsvInput.value = "";
        });

        ["dragenter", "dragover"].forEach((eventName) => {
            multiCsvDropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                multiCsvDropzone.classList.add("drag-active");
            });
        });

        ["dragleave", "drop"].forEach((eventName) => {
            multiCsvDropzone.addEventListener(eventName, (event) => {
                event.preventDefault();
                event.stopPropagation();
                multiCsvDropzone.classList.remove("drag-active");
            });
        });

        multiCsvDropzone.addEventListener("drop", (event) => {
            const droppedFiles = Array.from(event.dataTransfer.files || []);
            addIncomingFiles(droppedFiles);
        });

        multiCsvRemoveBtn.addEventListener("click", () => {
            selectedFiles = [];
            syncInputFiles();
            renderSelectedFiles();
        });

        multiCsvForm.addEventListener("submit", (event) => {
            if (selectedFiles.length < 2) {
                event.preventDefault();
                multiCsvSelected.textContent = "Please add at least two CSV files.";
                return;
            }

            syncInputFiles();
            showLoadingOverlay("Revealing Your Compass Wrapped");
        });

        if (slideshowFileInput && slideshowSelectedFile) {
            slideshowFileInput.addEventListener("change", () => {
                updateSelectedFileName(slideshowFileInput, slideshowSelectedFile, "No file selected.");
            });
            updateSelectedFileName(slideshowFileInput, slideshowSelectedFile, "No file selected.");
        }

        if (slideshowUploadForm) {
            slideshowUploadForm.addEventListener("submit", () => {
                showLoadingOverlay("Revealing Your Compass Slideshow");
            });
        }

        window.addEventListener("pageshow", () => {
            hideLoadingOverlay();
        });

        hideLoadingOverlay();
        renderSelectedFiles();
    </script>
</body>
</html>
